name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: qt/qt:6.6.0-android
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        run: |
          apt-get update
          apt-get install -y openjdk-17-jdk

      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export ANDROID_NDK_ROOT=/opt/android-ndk
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          
          mkdir build && cd build
          /opt/qt/6.6.0/android/bin/qmake ../Android.pro -spec android-clang ANDROID_ABIS="arm64-v8a"
          make -j$(nproc)
          /opt/qt/6.6.0/android/bin/androiddeployqt \
            --input android-Android-deployment-settings.json \
            --output android-build \
            --android-platform android-31 \
            --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            build/android-build/build/outputs/apk/release/*.apk
            build/android-build/*.apk
