name: Build Qt Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platform-tools platforms;android-31 build-tools;31.0.0'

    - name: Install Qt 5.15.2 for Android
      run: |
        # 下载 Qt 5.15.2 Android 预编译包
        wget https://download.qt.io/archive/qt/5.15/5.15.2/submodules/qtbase-everywhere-src-5.15.2.tar.xz
        wget https://download.qt.io/archive/qt/5.15/5.15.2/submodules/qtsvg-everywhere-src-5.15.2.tar.xz
        tar -xf qtbase-everywhere-src-5.15.2.tar.xz
        tar -xf qtsvg-everywhere-src-5.15.2.tar.xz
        cd qtbase-everywhere-src-5.15.2
        mkdir build && cd build
        ../configure -xplatform android-clang -android-ndk $ANDROID_HOME/ndk-bundle -android-sdk $ANDROID_HOME -prefix $GITHUB_WORKSPACE/qtbase -nomake tests -nomake examples
        make -j2
        make install

    - name: Build APK
      run: |
        mkdir -p build
        cd build
        export PATH=$GITHUB_WORKSPACE/qtbase/bin:$PATH
        qmake ../Android.pro -spec android-clang ANDROID_ABIS="arm64-v8a"
        make -j2

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SmartLock-APK
        path: |
          build/*.apk
          build/android-build/build/outputs/apk/release/*.apk
