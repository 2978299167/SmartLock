name: Build Qt Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platform-tools platforms;android-31 build-tools;31.0.0'

    - name: Install Qt via apt
      run: |
        sudo apt-get update
        sudo apt-get install -y qt5-qmake qtbase5-dev qtbase5-dev-tools qtdeclarative5-dev qt5-image-formats-plugins qttools5-dev-tools qtpositioning5-dev libqt5serialport5-dev libqt5opengl5-dev

    - name: Install Android Qt libraries (manually)
      run: |
        # 下载 Qt for Android 预编译包
        wget https://download.qt.io/archive/qt/5.15/5.15.2/submodules/qtsvg-everywhere-src-5.15.2.tar.xz
        tar -xf qtsvg-everywhere-src-5.15.2.tar.xz
        cd qtsvg-everywhere-src-5.15.2
        mkdir build && cd build
        ../configure -xplatform android-clang -no-widgets -no-gui -no-opengl -android-ndk $ANDROID_HOME/ndk-bundle -android-sdk $ANDROID_HOME
        make -j2
        sudo make install

    - name: Build APK
      run: |
        mkdir -p build
        cd build
        qmake ../Android.pro -spec android-clang ANDROID_ABIS="arm64-v8a"
        make -j2
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        # 如果 androiddeployqt 找不到，尝试路径
        if [ -f /usr/lib/qt5/bin/androiddeployqt ]; then
          /usr/lib/qt5/bin/androiddeployqt --input android-Android-deployment-settings.json --output android-build --android-platform android-31 --release
        else
          echo "androiddeployqt not found, skipping deployment"
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SmartLock-APK
        path: |
          build/android-build/build/outputs/apk/release/*.apk
          build/android-build/*.apk
          build/*.apk
