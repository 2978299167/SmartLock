name: Build APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build APK
        uses: cristianmiranda/qt-android@v1
        with:
          qt-version: 5.15.2
          target: android_arm64_v8a
          project-file: Android.pro
          android-manifest: android_sources/AndroidManifest.xml
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: '*.apk'
