name: Build Qt Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platform-tools platforms;android-31 build-tools;31.0.0'

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        host: 'linux'
        target: 'android'
        arch: 'android_arm64_v8a'
        cache: true

    - name: Build APK
      run: |
        mkdir -p build
        cd build
        ${{ env.QT_ROOT }}/bin/qmake ../Android.pro -spec android-clang ANDROID_ABIS="arm64-v8a"
        make -j2
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        ${{ env.QT_ROOT }}/bin/androiddeployqt --input android-Android-deployment-settings.json --output android-build --android-platform android-31 --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SmartLock-APK
        path: |
          build/android-build/build/outputs/apk/release/*.apk
          build/android-build/*.apk
