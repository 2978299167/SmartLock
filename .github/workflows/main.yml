name: Build Qt Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          target: 'android'
          arch: 'android_arm64_v8a'
          setup-python: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-31 build-tools;30.0.3 ndk;21.4.7075529'

      - name: Build APK
        run: |
          mkdir build && cd build
          ${{ env.QT_ROOT }}/bin/qmake ../Android.pro -spec android-clang ANDROID_ABIS="arm64-v8a"
          make -j2
          ${{ env.QT_ROOT }}/bin/androiddeployqt \
            --input android-Android-deployment-settings.json \
            --output android-build \
            --android-platform android-31 \
            --release \
            --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartLock-APK
          path: |
            build/android-build/build/outputs/apk/release/*.apk
            build/android-build/*.apk
