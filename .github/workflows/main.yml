name: Build Qt Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 使用一个已经配置好 Qt 5.15.2 for Android 的 Docker 镜像
    container: qtcontrib/qt-ci:5.15.2_android

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build APK
      run: |
        # 进入项目目录并创建构建文件夹
        mkdir -p build
        cd build
        
        # 使用镜像内的 qmake 配置项目
        /opt/qt/5.15.2/android_arm64_v8a/bin/qmake ../Android.pro -spec android-clang ANDROID_ABIS="arm64-v8a"
        
        # 开始编译
        make -j$(nproc)
        
        # 打包成 APK
        /opt/qt/5.15.2/android_arm64_v8a/bin/androiddeployqt --input android-Android-deployment-settings.json --output android-build --android-platform android-31 --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SmartLock-APK
        path: |
          build/android-build/build/outputs/apk/release/*.apk
          build/android-build/*.apk
